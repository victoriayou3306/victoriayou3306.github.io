<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project | Victoria You</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Project header ── */
    .project-header { padding: 3rem 0 2rem; }
    .project-header h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700; line-height: 1.2; margin-bottom: 0.75rem; }
    .project-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .project-body { max-width: 680px; }
    .project-body p { margin-bottom: 1.25rem; color: var(--text); line-height: 1.8; font-size: 1.02rem; }
    .back-link { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.88rem; color: var(--text-muted); margin-bottom: 2rem; }
    .back-link:hover { color: var(--accent); text-decoration: none; }
    .not-found { padding: 5rem 0; text-align: center; color: var(--text-muted); }

    /* ── Photo gallery ── */
    .media-section { margin: 2.5rem 0; }
    .media-heading { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .gallery-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: var(--accent-light);
      aspect-ratio: 4/3;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 0;
      display: block;
      transition: transform 0.25s;
    }
    .gallery-item:hover img { transform: scale(1.04); }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: min(90vw, 1000px);
      max-height: 85vh;
      object-fit: contain;
      border-radius: 6px;
    }
    .lightbox-close {
      position: absolute; top: 1.25rem; right: 1.5rem;
      color: #fff; font-size: 2rem; cursor: pointer; line-height: 1;
      background: none; border: none; opacity: 0.8;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-prev, .lightbox-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.15); color: #fff;
      border: none; font-size: 1.8rem; cursor: pointer;
      padding: 0.5rem 0.9rem; border-radius: 6px; line-height: 1;
    }
    .lightbox-prev { left: 1rem; }
    .lightbox-next { right: 1rem; }
    .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.28); }
    .lightbox-caption {
      position: absolute; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 0.85rem;
    }

    /* ── PDF Slideshow ── */
    .slideshow-wrap {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
    }
    .slideshow-canvas-row {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      padding: 1rem;
    }
    #slideCanvas {
      max-width: 100%;
      border-radius: 4px;
      display: block;
    }
    .slideshow-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: #111;
      color: #ccc;
      font-size: 0.88rem;
      gap: 1rem;
    }
    .slide-btn {
      background: rgba(255,255,255,0.1);
      border: none; color: #fff;
      padding: 0.4rem 1rem; border-radius: 5px;
      cursor: pointer; font-size: 0.88rem;
      transition: background 0.15s;
    }
    .slide-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
    .slide-btn:disabled { opacity: 0.3; cursor: default; }
    .slide-counter { color: #aaa; font-size: 0.85rem; white-space: nowrap; }
    .slide-loading { color: #aaa; font-size: 0.9rem; padding: 2rem; text-align: center; }

    /* ── Prev/Next project nav ── */
    .proj-nav { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .proj-nav a { font-size: 0.88rem; color: var(--text-muted); }
    .proj-nav a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <nav>
    <span class="nav-name">Victoria You</span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html" class="active">Projects</a></li>
      <li><a href="about.html">About Me</a></li>
    </ul>
  </nav>

  <div class="container">
    <div id="content"></div>
  </div>

  <!-- Lightbox (shared, outside container) -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="lbClose()">×</button>
    <button class="lightbox-prev" onclick="lbStep(-1)">‹</button>
    <img id="lbImg" src="" alt="" />
    <button class="lightbox-next" onclick="lbStep(1)">›</button>
    <div class="lightbox-caption" id="lbCaption"></div>
  </div>

  <footer>
    © <span id="year"></span> Victoria You
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </footer>

  <!-- PDF.js from CDN — only used when a project has slides -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script src="projects.js"></script>
  <script src="projects-utils.js"></script>
  <script>
    /* ─── Load project ─────────────────────────────────────── */
    const params  = new URLSearchParams(window.location.search);
    const id      = params.get('id');
    const project = PROJECTS.find(p => p.id === id);
    const content = document.getElementById('content');

    if (!project) {
      content.innerHTML = `
        <div class="not-found">
          <h2 style="font-family:var(--font-display);margin-bottom:1rem;">Project not found</h2>
          <p><a href="projects.html">← Back to all projects</a></p>
        </div>`;
    } else {
      document.title = `${project.name} | Victoria You`;

      const dateStr  = fmtDateRange(project.dateStart, project.date);
      const bodyHTML = (project.body || '')
        .split(/\n\n+/).filter(Boolean)
        .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');

      sortProjects(PROJECTS);
      const idx  = PROJECTS.findIndex(p => p.id === id);
      const prev = PROJECTS[idx + 1];
      const next = PROJECTS[idx - 1];

      /* Images */
      const imgs = (project.images || []).filter(Boolean);
      const galleryHTML = imgs.length ? `
        <div class="media-section">
          <div class="media-heading">Photos</div>
          <div class="gallery" id="gallery">
            ${imgs.map((f, i) => `
              <div class="gallery-item" onclick="lbOpen(${i})">
                <img src="assets/projects/${id}/${f}" alt="${f}" loading="lazy" />
              </div>`).join('')}
          </div>
        </div>` : '';

      /* Slideshow */
      const slidesHTML = project.slides ? `
        <div class="media-section">
          <div class="media-heading">Slides</div>
          <div class="slideshow-wrap">
            <div class="slideshow-canvas-row">
              <div class="slide-loading" id="slideLoading">Loading slides…</div>
              <canvas id="slideCanvas" style="display:none;"></canvas>
            </div>
            <div class="slideshow-controls">
              <button class="slide-btn" id="slidePrev" onclick="slideStep(-1)" disabled>‹ Prev</button>
              <span class="slide-counter" id="slideCounter">— / —</span>
              <button class="slide-btn" id="slideNext" onclick="slideStep(1)" disabled>Next ›</button>
            </div>
          </div>
        </div>` : '';

      content.innerHTML = `
        <div class="project-header">
          <a class="back-link" href="projects.html">← All projects</a>
          <h1>${project.name}</h1>
          <div class="project-meta">
            <span class="card-category" style="margin:0;">${project.cat}</span>
            ${dateStr ? `<span class="card-date">${dateStr}</span>` : ''}
          </div>
          <div class="card-tags" style="margin-bottom:1.5rem;">
            ${project.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
          </div>
          ${project.link ? `<a class="btn btn-outline" href="${project.link}" target="_blank" style="margin-bottom:2rem;">${project.linkLabel || 'View project'} →</a>` : ''}
        </div>

        <hr class="section-divider" style="margin-top:0;" />

        <div class="project-body" style="padding:2rem 0;">
          ${bodyHTML || `<p style="color:var(--text-muted);">[No description yet — add a <code>body</code> field to this project in projects.js]</p>`}
        </div>

        ${galleryHTML}
        ${slidesHTML}

        <div class="proj-nav">
          <div>${prev ? `<a href="project.html?id=${prev.id}">← ${prev.name}</a>` : ''}</div>
          <div>${next ? `<a href="project.html?id=${next.id}">${next.name} →</a>` : ''}</div>
        </div>
      `;

      /* Init PDF slideshow after DOM is ready */
      if (project.slides) initSlideshow(`assets/projects/${id}/${project.slides}`);
    }

    /* ─── Lightbox ─────────────────────────────────────────── */
    let lbImages = [];
    let lbIndex  = 0;

    function lbOpen(i) {
      const imgs = (project.images || []).filter(Boolean);
      lbImages = imgs.map(f => ({ src: `assets/projects/${id}/${f}`, caption: f }));
      lbIndex  = i;
      lbShow();
      document.getElementById('lightbox').classList.add('open');
    }
    function lbShow() {
      document.getElementById('lbImg').src     = lbImages[lbIndex].src;
      document.getElementById('lbCaption').textContent =
        `${lbIndex + 1} / ${lbImages.length}`;
    }
    function lbStep(dir) {
      lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
      lbShow();
    }
    function lbClose() { document.getElementById('lightbox').classList.remove('open'); }
    function closeLightbox(e) { if (e.target === document.getElementById('lightbox')) lbClose(); }
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowRight') lbStep(1);
      if (e.key === 'ArrowLeft')  lbStep(-1);
      if (e.key === 'Escape')     lbClose();
    });

    /* ─── PDF Slideshow ────────────────────────────────────── */
    let pdfDoc      = null;
    let currentPage = 1;

    async function initSlideshow(url) {
      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        document.getElementById('slideLoading').style.display = 'none';
        document.getElementById('slideCanvas').style.display  = 'block';
        updateSlideButtons();
        await renderSlide(1);
      } catch (err) {
        document.getElementById('slideLoading').textContent =
          'Could not load slides. Make sure the PDF is in assets/projects/' + id + '/';
      }
    }

    async function renderSlide(pageNum) {
      const page     = await pdfDoc.getPage(pageNum);
      const canvas   = document.getElementById('slideCanvas');
      const maxW     = canvas.parentElement.clientWidth - 32; // 32 = 2×1rem padding
      const viewport = page.getViewport({ scale: 1 });
      const scale    = Math.min(maxW / viewport.width, 1.5);
      const scaled   = page.getViewport({ scale });
      canvas.width   = scaled.width;
      canvas.height  = scaled.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: scaled }).promise;
      document.getElementById('slideCounter').textContent = `${pageNum} / ${pdfDoc.numPages}`;
    }

    async function slideStep(dir) {
      const next = currentPage + dir;
      if (next < 1 || next > pdfDoc.numPages) return;
      currentPage = next;
      updateSlideButtons();
      await renderSlide(currentPage);
    }

    function updateSlideButtons() {
      document.getElementById('slidePrev').disabled = currentPage <= 1;
      document.getElementById('slideNext').disabled = currentPage >= (pdfDoc ? pdfDoc.numPages : 1);
    }
  </script>

</body>
</html>
