<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project | Victoria You</title>
  <link rel="stylesheet" href="style.css" />
  <!-- MathJax — renders LaTeX in body-*.html files -->
  <script>MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']] } };</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    /* ── Header — no-image version ── */
    .project-header { padding: 3rem 0 2rem; }
    .project-header h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700; line-height: 1.2; margin-bottom: 0.75rem; }
    .project-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .back-link { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.88rem; color: var(--text-muted); margin-bottom: 2rem; }
    .back-link:hover { color: var(--accent); text-decoration: none; }
    .not-found { padding: 5rem 0; text-align: center; color: var(--text-muted); }

    /* ── Header banner — full viewport width, text constrained inside ── */
    .header-banner {
      position: relative;
      overflow: hidden;
      width: 100%;
    }
    .header-banner-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }
    .header-banner-content {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 2rem 2.5rem;
    }
    .header-banner .back-link { opacity: 0.75; }
    .header-banner .back-link:hover { opacity: 1; }

    /* ── Project body (your HTML) ── */
    .project-body { max-width: 720px; margin: 0 auto; padding: 2rem 0; }
    .project-body p  { margin-bottom: 1.25rem; color: var(--text); line-height: 1.8; font-size: 1.02rem; }
    .project-body h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 600; margin: 2rem 0 0.75rem; }
    .project-body h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }
    .project-body ul, .project-body ol { padding-left: 1.5rem; margin-bottom: 1.25rem; color: var(--text); line-height: 1.8; font-size: 1.02rem; }
    .project-body li { margin-bottom: 0.3rem; }

    .project-body section:first-child > :is(h2,h3,h4):first-child,
    .project-body > :is(h2,h3,h4):first-child {
      margin-top: -3rem;
    }

    /* ── Body + sidebar/TOC layout ── */
    .project-layout {
      position: relative;
      padding: 2rem 0;
    }
    .project-layout .project-body {
      max-width: 720px;
      padding: 0;
      margin: 0 auto;
    }

    .project-toc {
      position: absolute;
      left: -220px;
      top: var(--toc-top, 2rem);
      width: 180px;

      z-index: 2;
    }

    .project-toc::before {
      content: '';
      position: absolute;
      inset: -8px -12px;
      background: var(--bg);
      z-index: -1;
    }
    .project-toc.sticky-toc {
      position: fixed;
      top: calc(var(--nav-height) + var(--toc-offset, 5.5rem));
    }
    .toc-label {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-muted); margin-bottom: 0.6rem;
      /* Fix 3: ensure no border leaks from global styles */
      border: none;
    }
    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0;

      border-left: 2px solid var(--border);
      border-top: none;
      border-bottom: none;
      border-right: none;

      background: var(--bg);
    }
    .toc-list li { border: none; }
    .toc-list li a {
      display: block;
      padding: 0.3rem 0 0.3rem 0.85rem;
      font-size: 0.82rem; color: var(--text-muted);
      text-decoration: none; line-height: 1.4;
      transition: color 0.15s;
      border-left: 2px solid transparent;
      margin-left: -2px;
    }
    .toc-list li a:hover  { color: var(--accent); }
    .toc-list li a.active { color: var(--accent); border-left-color: var(--accent); }

    /* Right sidebar — each box is its own <aside> with top set inline per-box */
    .project-sidebar {
      position: absolute;
      right: -220px;
      width: 180px;
      /* top is set inline per box in JS */
    }
    .sidebar-box img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      display: block;
    }
    .sidebar-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      font-size: 0.85rem; line-height: 1.6; color: var(--text);
    }
    .sidebar-box + .sidebar-box { margin-top: 1rem; }
    .sidebar-box-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-muted); margin-bottom: 0.5rem;
    }
    .sidebar-box p { margin: 0; font-size: 0.85rem; line-height: 1.6; }
    .sidebar-box a { color: var(--accent); }

    /* Hide both on narrow screens */
    @media (max-width: 1160px) { .project-toc    { display: none; } }
    @media (max-width: 1160px) { .project-sidebar { display: none; } }

    /* ── Image helpers (use these classes in your body HTML) ── */
    .img-full { width: 100%; border-radius: 8px; margin: 1.5rem 0; display: block; }
    .img-center { display: block; margin: 1.5rem auto; border-radius: 8px; width: var(--w, 100%); max-width: 100%; }
    .img-right { float: right; margin: 0.25rem 0 1rem 1.75rem; border-radius: 8px; width: var(--w, 280px); max-width: 48%; }
    .img-left  { float: left;  margin: 0.25rem 1.75rem 1rem 0; border-radius: 8px; width: var(--w, 280px); max-width: 48%; }
    .clear { clear: both; }
    .img-pair {
      display: flex;
      gap: 10px;

      width: 100%;
      max-width: 900px;   /* or whatever your reading width is */
      margin: 1.5rem auto; /* THIS centers it */

      justify-content: center;
    }
    .img-pair img {
      flex: 1;
      min-width: 0;
      border-radius: 8px;
      display: block;
      object-fit: cover;
    }
    .img-pair.float-right {
      float: right;
      width: var(--w, 520px);
      margin: 0.25rem 0 1rem 1.75rem;
    }

    .img-pair.float-left {
      float: left;
      width: var(--w, 520px);
      margin: 0.25rem 1.75rem 1rem 0;
    }

    .img-trio { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 1.5rem 0; }
    /* Each cell inside img-pair/trio: image + optional caption stacked */
    .img-pair-cell, .img-trio-cell { display: flex; flex-direction: column; }
    .img-pair-cell img, .img-trio-cell img,
    .img-pair > img,   .img-trio > img { width: 100%; border-radius: 8px; }
    /* Caption sits directly under its image, left-aligned like a figure */
    .img-pair-cell .img-caption,
    .img-trio-cell .img-caption {
      margin-top: 0.4rem; margin-bottom: 0;
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
    }
    .img-caption { font-size: 0.82rem; color: var(--text-muted); text-align: center; margin-top: -0.9rem; margin-bottom: 1.5rem; }
    img.lb { cursor: zoom-in; }

    /* ── Inline image gallery ──────────────────────────────────────────
       Usage in body-*.html:

       <div class="img-gallery" style="--gw:500px">
         <img src="assets/projects/myproject/a.jpg" data-caption="Caption A">
         <img src="assets/projects/myproject/b.jpg" data-caption="Caption B">
         <img src="assets/projects/myproject/c.jpg">
       </div>

       --gw  : width of the gallery (default 100%). Accepts any CSS value:
               px, %, rem, etc. Same system as --w on individual images.
       float variants — add a class alongside .img-gallery:
         .img-gallery-right  floats right, text wraps left  (use --gw for width)
         .img-gallery-left   floats left,  text wraps right
       Lightbox: clicking any image opens it full-screen.
       Captions: set data-caption on each <img>; shown below stage.
    ── */
    .img-gallery {
      display: block;
      width: var(--gw, 100%);
      max-width: 100%;
      margin: 1.5rem auto;
      user-select: none;
    }
    .img-gallery-right {
      float: right;
      margin: 0.25rem 0 1rem 1.75rem;
      width: var(--gw, 320px);
      max-width: 48%;
    }
    .img-gallery-left {
      float: left;
      margin: 0.25rem 1.75rem 1rem 0;
      width: var(--gw, 320px);
      max-width: 48%;
    }
    .img-gallery-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;   /* overridden to natural ratio once first image loads */
      overflow: hidden;
      border-radius: 8px;
      background: var(--accent-light);
      cursor: zoom-in;
    }
    .img-gallery-track {
      display: flex;
      height: 100%;
      transition: transform 0.3s ease;
      will-change: transform;
    }
    .img-gallery-track img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
      border-radius: 0;
      display: block;
      pointer-events: none;
    }
    /* Prev / Next */
    .img-gallery-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.78);
      border: none; border-radius: 50%;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
      transition: background 0.15s, opacity 0.15s;
      z-index: 2; padding: 0; line-height: 1;
    }
    .img-gallery-btn:hover { background: rgba(255,255,255,0.97); }
    .img-gallery-btn:disabled { opacity: 0; pointer-events: none; }
    .img-gallery-btn.prev { left: 7px; }
    .img-gallery-btn.next { right: 7px; }
    /* Counter badge */
    .img-gallery-counter {
      position: absolute;
      bottom: 8px; right: 10px;
      background: rgba(0,0,0,0.45);
      color: #fff; font-size: 0.72rem;
      padding: 2px 7px; border-radius: 10px;
      pointer-events: none;
    }
    /* Dots */
    .img-gallery-dots {
      display: flex; justify-content: center; gap: 5px;
      margin-top: 7px;
    }
    .img-gallery-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border);
      transition: background 0.2s, transform 0.2s;
      cursor: pointer; border: none; padding: 0;
    }
    .img-gallery-dot.active { background: var(--accent); transform: scale(1.3); }
    /* Caption */
    .img-gallery-caption {
      min-height: 1.3em;
      font-size: 0.82rem; color: var(--text-muted);
      text-align: center; font-style: italic;
      margin-top: 5px; line-height: 1.4;
    }
    @media (max-width: 640px) {
      .img-gallery-right, .img-gallery-left {
        float: none; width: 100% !important; max-width: 100%; margin: 1rem 0;
      }
    }

    /* ── Video helpers — mirrors image helpers; use on <video> or a .vid-wrap div ── */
    /* Full-width self-hosted video */
    .vid-full { width: 100%; border-radius: 8px; margin: 1.5rem 0; display: block; }

    /* Centered at a specific width — add style="--w:560px" to control */
    .vid-center { display: block; margin: 1.5rem auto; border-radius: 8px; width: var(--w, 100%); max-width: 100%; }

    /* Float right, text wraps left — add style="--w:320px" to control */
    .vid-right { float: right; margin: 0.25rem 0 1rem 1.75rem; border-radius: 8px; width: var(--w, 280px); max-width: 48%; }

    /* Float left, text wraps right */
    .vid-left  { float: left;  margin: 0.25rem 1.75rem 1rem 0; border-radius: 8px; width: var(--w, 280px); max-width: 48%; }

    /* Responsive iframe embed (YouTube / Vimeo) — wrap an <iframe> in this div  */
    /* Usage: <div class="vid-embed[ vid-embed-right]" style="--w:480px"><iframe ...></iframe></div> */
    .vid-embed {
      position: relative; width: var(--w, 100%); max-width: 100%;
      margin: 1.5rem auto; border-radius: 8px; overflow: hidden;
    }
    .vid-embed iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; border-radius: 8px;
    }
    /* Aspect ratios for vid-embed — default 16:9 */
    .vid-embed::before          { content: ''; display: block; padding-top: 56.25%; }
    .vid-embed.ar-4-3::before   { padding-top: 75%; }
    .vid-embed.ar-1-1::before   { padding-top: 100%; }
    .vid-embed.ar-9-16::before  { padding-top: 177.78%; }

    /* Float variants for embeds */
    .vid-embed-right { float: right; margin: 0.25rem 0 1rem 1.75rem; width: var(--w, 320px); }
    .vid-embed-left  { float: left;  margin: 0.25rem 1.75rem 1rem 0; width: var(--w, 320px); }

    @media (max-width: 640px) {
      .vid-right, .vid-left { float: none; width: 100% !important; max-width: 100%; margin: 1rem 0; }
      .vid-embed-right, .vid-embed-left { float: none; width: 100% !important; margin: 1rem 0; }
    }

    /* ── Inline PDF viewer (scrollable, all pages rendered) ──
       Usage in body-*.html:
         <div class="pdf-viewer"
              data-src="assets/projects/myproject/report.pdf"
              data-label="My Report"
              data-download="true"
              style="--pdf-w:100%;--pdf-h:700px">
         </div>
       --pdf-w : width of the viewer (default 100%)
       --pdf-h : height of the scrollable area (default 800px)
       data-label    : heading shown above (omit to hide)
       data-download : set to "false" to hide download link (default true)
    */
    .pdf-viewer-wrap {
      margin: 2rem 0;
      width: var(--pdf-w, 100%);
    }
    .pdf-viewer-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .pdf-viewer-label {
      font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;
    }
    .pdf-viewer-download { font-size: 0.82rem; color: var(--accent); }
    .pdf-viewer-download:hover { text-decoration: underline; }
    .pdf-viewer-box {
      background: #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
    }
    /* Scrollable page stack */
    .pdf-viewer-scroll {
      height: var(--pdf-h, 800px);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      /* Custom scrollbar */
      scrollbar-width: thin;
      scrollbar-color: #555 #2a2a2a;
    }
    .pdf-viewer-scroll::-webkit-scrollbar { width: 7px; }
    .pdf-viewer-scroll::-webkit-scrollbar-track { background: #2a2a2a; border-radius: 10px; }
    .pdf-viewer-scroll::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    /* Each rendered page canvas */
    .pdf-viewer-page {
      width: 100%; height: auto;
      display: block;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    /* Toolbar below the scroll area */
    .pdf-viewer-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 1rem; background: #111;
      font-size: 0.8rem; color: #aaa; gap: 0.75rem;
    }
    .pdf-viewer-page-count { white-space: nowrap; }
    .pdf-viewer-loading {
      color: #aaa; font-size: 0.88rem;
      padding: 2.5rem; text-align: center; width: 100%;
    }

    /* ── PDF Slideshow ── */
    .slideshow-section { margin: 2.5rem 0; }
    .slideshow-label { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
    .slideshow-wrap { background: #1a1a1a; border-radius: 10px; overflow: hidden; }
    .slideshow-canvas-row { display: flex; justify-content: center; align-items: center; padding: 0; line-height: 0; }
    #slideCanvas { width: 100%; height: auto; display: block; border-radius: 0; }
    .slideshow-controls {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem; background: #111; gap: 1rem;
    }
    .slide-btn {
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      padding: 0.4rem 1rem; border-radius: 5px; cursor: pointer; font-size: 0.88rem;
      transition: background 0.15s;
    }
    .slide-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
    .slide-btn:disabled { opacity: 0.3; cursor: default; }
    .slide-counter { color: #aaa; font-size: 0.85rem; white-space: nowrap; }
    .slide-loading { color: #aaa; font-size: 0.9rem; padding: 2rem; text-align: center; width: 100%; }
    .slide-notes-wrap {
      background: #f5f4f1;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 1rem 1.5rem;
      min-height: 3rem;
    }
    .slide-notes-label {
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem;
    }
    .slide-notes-text {
      font-size: 0.92rem; color: var(--text); line-height: 1.7;
      white-space: pre-wrap;
    }
    .slide-notes-empty { color: var(--text-muted); font-size: 0.88rem; font-style: italic; }

    /* ── Image Deck (PNG slides + MP4 video overlays) ── */
    .deck-section { margin: 2.5rem 0; }
    .deck-label { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
    .deck-wrap { background: #1a1a1a; border-radius: 10px; overflow: hidden; }
    /* Slide stage: image fills width, video overlaid on top */
    .deck-stage {
      position: relative;
      width: 100%;
      line-height: 0;
      /* height is set by the image's natural aspect ratio */
    }
    .deck-stage img.deck-slide-img {
      width: 100%; height: auto; display: block; border-radius: 0;
    }
    /* Video overlay — sized/positioned via inline % styles set in JS */
    .deck-stage video.deck-video {
      position: absolute;
      object-fit: cover;
      border-radius: 2px;
      background: #000;
    }
    .deck-controls {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem; background: #111; gap: 1rem;
    }
    .deck-btn {
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      padding: 0.4rem 1rem; border-radius: 5px; cursor: pointer; font-size: 0.88rem;
      transition: background 0.15s;
    }
    .deck-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
    .deck-btn:disabled { opacity: 0.3; cursor: default; }
    .deck-counter { color: #aaa; font-size: 0.85rem; white-space: nowrap; }
    .deck-notes-wrap {
      background: #f5f4f1; border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 10px 10px;
      padding: 1rem 1.5rem; min-height: 3rem;
    }
    .deck-notes-label {
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem;
    }
    .deck-notes-text { font-size: 0.92rem; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
    .deck-notes-empty { color: var(--text-muted); font-size: 0.88rem; font-style: italic; }

    /* ── Prev/Next project nav ── */
    .proj-nav { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); margin-bottom: 2rem; }
    .proj-nav a { font-size: 0.88rem; color: var(--text-muted); }
    .proj-nav a:hover { color: var(--accent); }

    /* ── Lightbox ── */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000; align-items: center; justify-content: center; padding: 2rem; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: min(90vw,1000px); max-height: 85vh; object-fit: contain; border-radius: 6px; }
    .lb-close { position: absolute; top: 1.25rem; right: 1.5rem; color: #fff; font-size: 2rem; cursor: pointer; background: none; border: none; opacity: 0.8; line-height: 1; }
    .lb-close:hover { opacity: 1; }
    .lb-caption { position: absolute; bottom: 1.25rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 0.85rem; text-align: center; max-width: 600px; }

    @media (max-width: 640px) {
      .img-right, .img-left { float: none; width: 100% !important; max-width: 100%; margin: 1rem 0; }
      .img-pair, .img-trio { grid-template-columns: 1fr; }
      .vid-right, .vid-left { float: none; width: 100% !important; max-width: 100%; margin: 1rem 0; }
      .vid-embed-right, .vid-embed-left { float: none; width: 100% !important; margin: 1rem 0; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-name">Victoria You</span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html" class="active">Projects</a></li>
      <li><a href="about.html">About Me</a></li>
      <li>
        <a href="crane.html" class="nav-crane" aria-label="Crane">
          <img src="assets/crane.png" alt="" class="nav-crane-icon">
          <span class="nav-crane-count" id="navCraneCount"></span>
        </a>
      </li>
    </ul>
  </nav>

  <div id="proj-header"></div>

  <div class="container">
    <div class="project-body" id="proj-body"></div>
    <div id="proj-slides"></div>
    <div id="proj-nav"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="if(event.target===this)lbClose()">
    <button class="lb-close" onclick="lbClose()">×</button>
    <img id="lbImg" src="" alt="" />
    <div class="lb-caption" id="lbCaption"></div>
  </div>

  <footer>
    © <span id="year"></span> Victoria You
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="projects.js"></script>
  <script src="projects-utils.js"></script>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const id      = params.get('id');
    const project = PROJECTS.find(p => p.id === id);

    if (!project) {
      document.getElementById('proj-body').innerHTML = `
        <div class="not-found">
          <h2 style="font-family:var(--font-display);margin-bottom:1rem;">Project not found</h2>
          <p><a href="projects.html">← Back to all projects</a></p>
        </div>`;
    } else {
      document.title = `${project.name} | Victoria You`;

      /* ── Header ─────────────────────────────────────────────── */
      const dateStr = fmtDateRange(project.dateStart, project.date);

      const innerContent = `
        <a class="back-link" href="projects.html">← All projects</a>
        <h1 style="font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;line-height:1.2;margin-bottom:0.75rem;">${project.name}</h1>
        <div class="project-meta">
          <span class="card-category" style="margin:0;">${project.cat}</span>
          ${dateStr ? `<span class="card-date">${dateStr}</span>` : ''}
        </div>
        <div class="card-tags" style="margin-bottom:1.5rem;">
          ${project.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
        </div>
        ${project.link ? `<a class="btn btn-outline" href="${project.link}" target="_blank" style="margin-bottom:1rem;">${project.linkLabel || 'View project'} →</a>` : ''}`;

      if (project.headerImage) {
        const opacity = project.headerOpacity !== undefined ? project.headerOpacity : 0.25;
        const imgPath = `assets/projects/${id}/${project.headerImage}`;
        document.getElementById('proj-header').innerHTML = `
          <div class="header-banner">
            <div class="header-banner-bg"
                 style="background-image:url('${imgPath}');opacity:${opacity};"></div>
            <div class="header-banner-content">${innerContent}</div>
          </div>
          <div style="max-width:900px;margin:0 auto;padding:0 2rem;">
            <hr class="section-divider" style="margin-top:0;" />
          </div>`;
      } else {
        document.getElementById('proj-header').innerHTML = `
          <div style="max-width:900px;margin:0 auto;padding:3rem 2rem 0;">${innerContent}</div>
          <div style="max-width:900px;margin:0 auto;padding:0 2rem;">
            <hr class="section-divider" />
          </div>`;
      }

      /* ── Body ── */
      // Each sidebar box is its own <aside> so each can have an independent top offset.
      // In projects.js, set box.top (e.g. "18rem") to position it alongside the right
      // section of body text. Set box.image to a filename for an image box.
      const sidebarHTML = (project.sidebar || []).map(box => {
        const top    = box.top !== undefined ? box.top : '2rem';
        const imgHTML = box.image
          ? `<img src="assets/projects/${id}/${box.image}" alt="${box.imageAlt || ''}">`
          : '';
        return `
          <aside class="project-sidebar" style="top:${top}" data-natural-top="${top}">
            <div class="sidebar-box">
              ${box.title ? `<div class="sidebar-box-title">${box.title}</div>` : ''}
              ${imgHTML}
              ${box.content ? `<p>${box.content}</p>` : ''}
            </div>
          </aside>`;
      }).join('');

      const bodyWrapper = document.getElementById('proj-body');

      function injectLayout(html) {

        if (project.toc) {
          // ── Fix 1: inject section IDs directly into the html string ──
          // This ensures IDs survive the outerHTML swap that follows.
          let sectionIndex = 0;
          html = html.replace(/<h[2-4]([^>]*)>/gi, (match, attrs) => {
            if (/\bid=/.test(attrs)) return match; // already has an id, leave it
            return `<h2${attrs} id="section-${sectionIndex++}">`;
          });

          // Set innerHTML so we can query the headings for their text content
          bodyWrapper.innerHTML = html;
          const headings = [...bodyWrapper.querySelectorAll('h2, h3, h4')];

          const tocItemsClean = headings.map(h => {
            // Use only direct text nodes so icon/badge children don't appear in the TOC
            const firstText = [...h.childNodes]
              .filter(n => n.nodeType === 3)
              .map(n => n.textContent.trim())
              .join('') || h.textContent.trim();
            return `<li><a href="#${h.id}">${firstText}</a></li>`;
          });

          const tocHTML = `
            <nav class="project-toc" id="projToc">
              <div class="toc-label"></div>
              <ul class="toc-list">${tocItemsClean.join('')}</ul>
            </nav>`;

          bodyWrapper.outerHTML = `
            <div class="project-layout" id="projLayout">
              ${tocHTML}
              <div class="project-body" id="proj-body">${html}</div>
              ${sidebarHTML}
            </div>`;

          // Scroll spy + sticky TOC
          requestAnimationFrame(() => {
            const toc    = document.getElementById('projToc');
            const layout = document.getElementById('projLayout');
            const links  = document.querySelectorAll('.toc-list a');
            const navH   = parseInt(getComputedStyle(document.documentElement)
                             .getPropertyValue('--nav-height') || '64');
            const tocOffset = project.tocOffset || '5.5rem';
            const tocTop    = project.tocTop || '2rem';

            toc.style.setProperty('--toc-offset', tocOffset);
            toc.style.setProperty('--toc-top', tocTop);

            // ── Fix 2: compute correct left position when switching to fixed ──
            // When position:fixed, left is relative to the viewport, not the
            // container. We derive it from the layout's current bounding rect.
            // Capture the TOC's natural left position in viewport coords once,
            // before any scrolling moves it. We need this for the fixed state.
            let tocNaturalLeft = toc.getBoundingClientRect().left;

            window.addEventListener('scroll', () => {
              const tocRect    = toc.getBoundingClientRect();
              const layoutRect = layout.getBoundingClientRect();

              const stickyThreshold = navH + parseFloat(getComputedStyle(toc).getPropertyValue('--toc-offset')) * 16;
              if (!toc.classList.contains('sticky-toc')) {
                if (tocRect.top <= stickyThreshold) {
                  tocNaturalLeft = layoutRect.left - 220;
                  toc.style.left = tocNaturalLeft + 'px';
                  toc.classList.add('sticky-toc');
                }
              } else {
                const naturalTop = layoutRect.top + 32;
                if (naturalTop > stickyThreshold) {
                  toc.classList.remove('sticky-toc');
                  toc.style.left = '';
                }
              }

            }, { passive: true });

            // Active link highlight via IntersectionObserver
            const obs = new IntersectionObserver(entries => {
              entries.forEach(e => {
                if (e.isIntersecting) {
                  links.forEach(l => l.classList.remove('active'));
                  const a = [...links].find(l => l.getAttribute('href') === `#${e.target.id}`);
                  if (a) a.classList.add('active');
                }
              });
            }, { rootMargin: '-20% 0px -70% 0px' });
            document.querySelectorAll('.project-body h2, .project-body h3, .project-body h4').forEach(h => obs.observe(h));
            initVideoObserver();
            initInlinePDFs();
            initDeck();
            initGalleries();
            initPairCaptions();
          });

        } else {
          bodyWrapper.innerHTML = html;
          bodyWrapper.outerHTML = `
            <div class="project-layout">
              <div class="project-body" id="proj-body">${html}</div>
              ${sidebarHTML}
            </div>`;
          requestAnimationFrame(() => {
            initVideoObserver();
            initInlinePDFs();
            initDeck();
            initGalleries();
            initPairCaptions();
          });
        }
      }

      /* ─── Video: autoplay on scroll into view, pause on scroll out ───────
         Called directly by injectLayout once the DOM is settled — no race.
         All <video> elements get muted + playsinline (required for autoplay),
         controls always shown, play at 40% in-view, pause on exit.
      ──────────────────────────────────────────────────────────────────── */
      /* ─── Inline image galleries ─────────────────────────────────────────
         Activates every .img-gallery container in the body. Each gallery
         wraps its <img> children in a swipeable stage with prev/next buttons,
         dot indicators, a counter badge, captions from data-caption, and
         lightbox on click.
      ──────────────────────────────────────────────────────────────────── */
      function initGalleries() {
        document.querySelectorAll('.img-gallery').forEach((container, gi) => {
          const imgs = [...container.querySelectorAll('img')];
          if (!imgs.length) return;

          // Collect sources and captions before rebuilding DOM
          const slides = imgs.map(img => ({
            src:     img.getAttribute('src') || img.src,
            alt:     img.getAttribute('alt') || '',
            caption: img.getAttribute('data-caption') || ''
          }));

          const uid = `gal-${gi}-${Date.now()}`;
          const showDots    = slides.length > 1;
          const showCounter = slides.length > 1;

          container.innerHTML = `
            <div class="img-gallery-stage" id="${uid}-stage">
              <div class="img-gallery-track" id="${uid}-track">
                ${slides.map(s =>
                  `<img src="${s.src}" alt="${s.alt}" style="width:100%;height:100%;object-fit:cover;flex-shrink:0;border-radius:0;display:block;pointer-events:none;">`
                ).join('')}
              </div>
              ${showDots ? `<button class="img-gallery-btn prev" id="${uid}-prev">&#8249;</button>` : ''}
              ${showDots ? `<button class="img-gallery-btn next" id="${uid}-next">&#8250;</button>` : ''}
              ${showCounter ? `<span class="img-gallery-counter" id="${uid}-counter">1 / ${slides.length}</span>` : ''}
            </div>
            ${showDots ? `<div class="img-gallery-dots" id="${uid}-dots">
              ${slides.map((_, i) => `<button class="img-gallery-dot${i===0?' active':''}" data-i="${i}"></button>`).join('')}
            </div>` : ''}
            <div class="img-gallery-caption" id="${uid}-caption">${slides[0].caption}</div>`;

          const stage   = document.getElementById(`${uid}-stage`);
          const track   = document.getElementById(`${uid}-track`);
          const dotsEl  = document.getElementById(`${uid}-dots`);
          const capEl   = document.getElementById(`${uid}-caption`);
          const countEl = document.getElementById(`${uid}-counter`);
          const btnP    = document.getElementById(`${uid}-prev`);
          const btnN    = document.getElementById(`${uid}-next`);

          // Set track width so all slides sit side-by-side
          track.style.width = (slides.length * 100) + '%';
          track.querySelectorAll('img').forEach(img => img.style.width = (100 / slides.length) + '%');

          // Adjust stage aspect ratio to the first image's natural ratio once loaded
          const firstImg = track.querySelector('img');
          firstImg.addEventListener('load', () => {
            if (firstImg.naturalWidth && firstImg.naturalHeight) {
              stage.style.aspectRatio = `${firstImg.naturalWidth} / ${firstImg.naturalHeight}`;
            }
          }, { once: true });

          let cur = 0;

          function goTo(n) {
            cur = Math.max(0, Math.min(n, slides.length - 1));
            track.style.transform = `translateX(-${cur * (100 / slides.length)}%)`;
            if (capEl)   capEl.textContent   = slides[cur].caption;
            if (countEl) countEl.textContent = `${cur + 1} / ${slides.length}`;
            if (btnP) btnP.disabled = cur <= 0;
            if (btnN) btnN.disabled = cur >= slides.length - 1;
            if (dotsEl) dotsEl.querySelectorAll('.img-gallery-dot').forEach((d, i) =>
              d.classList.toggle('active', i === cur));
          }

          if (btnP) btnP.addEventListener('click', e => { e.stopPropagation(); goTo(cur - 1); });
          if (btnN) btnN.addEventListener('click', e => { e.stopPropagation(); goTo(cur + 1); });
          if (dotsEl) dotsEl.addEventListener('click', e => {
            const i = e.target.dataset.i;
            if (i !== undefined) goTo(+i);
          });

          // Click stage to open lightbox
          stage.addEventListener('click', () => {
            lb({ src: slides[cur].src, alt: slides[cur].caption || slides[cur].alt });
          });

          // Touch / pointer swipe
          let startX = null;
          stage.addEventListener('pointerdown', e => {
            startX = e.clientX;
            track.style.transition = 'none';
          });
          stage.addEventListener('pointermove', e => {
            if (startX === null) return;
            const dx = e.clientX - startX;
            const pct = (cur * (100 / slides.length)) - (dx / stage.offsetWidth * (100 / slides.length));
            track.style.transform = `translateX(-${pct}%)`;
          });
          stage.addEventListener('pointerup', e => {
            if (startX === null) return;
            const dx = e.clientX - startX;
            track.style.transition = 'transform 0.3s ease';
            if      (dx < -40) goTo(cur + 1);
            else if (dx >  40) goTo(cur - 1);
            else               goTo(cur);
            startX = null;
          });
          stage.addEventListener('pointercancel', () => {
            track.style.transition = 'transform 0.3s ease';
            goTo(cur); startX = null;
          });

          goTo(0);
        });
      }

      /* ─── img-pair / img-trio caption wiring ────────────────────────────
         For any <img data-caption="..."> that is a direct child of .img-pair
         or .img-trio, wrap it in a .img-pair-cell / .img-trio-cell div and
         append a caption paragraph beneath it.
         Plain <img> without data-caption are left unwrapped.
      ──────────────────────────────────────────────────────────────────── */
      function initPairCaptions() {
        document.querySelectorAll('.img-pair > img[data-caption], .img-trio > img[data-caption]').forEach(img => {
          const caption = img.getAttribute('data-caption');
          if (!caption) return;
          const isPair = img.parentElement.classList.contains('img-pair');
          const cell   = document.createElement('div');
          cell.className = isPair ? 'img-pair-cell' : 'img-trio-cell';
          img.parentElement.insertBefore(cell, img);
          cell.appendChild(img);
          const cap = document.createElement('p');
          cap.className   = 'img-caption';
          cap.textContent = caption;
          cell.appendChild(cap);
        });
      }

      function initVideoObserver() {
        const videos = document.querySelectorAll('.project-body video, .project-layout video');
        if (!videos.length) return;
        const obs = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            const v = entry.target;
            if (entry.isIntersecting) {
              v.play().catch(() => {});
            } else {
              v.pause();
            }
          });
        }, { threshold: 0.4 });
        videos.forEach(v => {
          v.muted    = true;
          v.controls = true;
          if (!v.hasAttribute('playsinline')) v.setAttribute('playsinline', '');
          obs.observe(v);
        });
      }

      /* ─── Inline PDF viewers ─────────────────────────────────────────────
         Finds every <div class="pdf-viewer" data-src="..."> in the body and
         builds a self-contained paginated canvas viewer inside it.
         Each viewer is fully independent — multiple per page is fine.
      ──────────────────────────────────────────────────────────────────── */
      function initInlinePDFs() {
        const containers = document.querySelectorAll('.pdf-viewer[data-src]');
        if (!containers.length) return;

        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        containers.forEach((container, idx) => {
          const src      = container.getAttribute('data-src');
          const label    = container.getAttribute('data-label');
          const download = container.getAttribute('data-download') !== 'false';
          const uid      = `pdfv-${idx}-${Date.now()}`;

          // Inherit --pdf-w and --pdf-h from the container element so the
          // wrapper picks them up via CSS var inheritance
          const wrapStyle = container.style.cssText || '';

          container.innerHTML = `
            <div class="pdf-viewer-wrap" style="${wrapStyle}">
              ${(label || download) ? `
              <div class="pdf-viewer-header">
                ${label ? `<span class="pdf-viewer-label">${label}</span>` : '<span></span>'}
                ${download ? `<a class="pdf-viewer-download" href="${src}" download>↓ Download PDF</a>` : ''}
              </div>` : ''}
              <div class="pdf-viewer-box">
                <div class="pdf-viewer-scroll" id="${uid}-scroll">
                  <div class="pdf-viewer-loading" id="${uid}-loading">Loading…</div>
                </div>
                <div class="pdf-viewer-toolbar">
                  <span class="pdf-viewer-page-count" id="${uid}-count">Loading…</span>
                </div>
              </div>
            </div>`;

          const scrollEl = document.getElementById(`${uid}-scroll`);
          const loadEl   = document.getElementById(`${uid}-loading`);
          const countEl  = document.getElementById(`${uid}-count`);

          pdfjsLib.getDocument(src).promise.then(async pdfDoc => {
            loadEl.remove();
            const total = pdfDoc.numPages;
            countEl.textContent = `${total} page${total !== 1 ? 's' : ''}`;

            // Render all pages sequentially into individual canvases
            for (let n = 1; n <= total; n++) {
              const pg      = await pdfDoc.getPage(n);
              const canvas  = document.createElement('canvas');
              canvas.className = 'pdf-viewer-page';

              const containerW = scrollEl.clientWidth - 24; // subtract padding
              const vp0   = pg.getViewport({ scale: 1 });
              const scale = (containerW / vp0.width) * (window.devicePixelRatio || 1);
              const vp    = pg.getViewport({ scale });

              canvas.width        = vp.width;
              canvas.height       = vp.height;
              canvas.style.width  = containerW + 'px';
              canvas.style.height = Math.round(containerW * (vp0.height / vp0.width)) + 'px';

              scrollEl.appendChild(canvas);
              await pg.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
            }

            // Re-render all pages on resize
            let resizeTimer;
            window.addEventListener('resize', () => {
              clearTimeout(resizeTimer);
              resizeTimer = setTimeout(async () => {
                const canvases = scrollEl.querySelectorAll('.pdf-viewer-page');
                for (let n = 1; n <= total; n++) {
                  const pg     = await pdfDoc.getPage(n);
                  const canvas = canvases[n - 1];
                  if (!canvas) continue;
                  const containerW = scrollEl.clientWidth - 24;
                  const vp0   = pg.getViewport({ scale: 1 });
                  const scale = (containerW / vp0.width) * (window.devicePixelRatio || 1);
                  const vp    = pg.getViewport({ scale });
                  canvas.width        = vp.width;
                  canvas.height       = vp.height;
                  canvas.style.width  = containerW + 'px';
                  canvas.style.height = Math.round(containerW * (vp0.height / vp0.width)) + 'px';
                  await pg.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                }
              }, 200);
            });

          }).catch(() => {
            loadEl.textContent = `Could not load PDF: ${src}`;
          });
        });
      }

      fetch(`body-${id}.html`)
        .then(r => { if (!r.ok) throw new Error(); return r.text(); })
        .then(html => injectLayout(html))
        .catch(() => {
          const bodyHTML = (project.body || '')
            .split(/\n\n+/).filter(Boolean)
            .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
          injectLayout(bodyHTML || `<p style="color:var(--text-muted);">[No description yet.]</p>`);
        });

      /* ── Slideshow ───────────────────────────────────────────── */
      if (project.slides) {
        document.getElementById('proj-slides').innerHTML = `
          <div class="slideshow-section">
            <div class="slideshow-label">Slides</div>
            <div class="slideshow-wrap">
              <div class="slideshow-canvas-row">
                <div class="slide-loading" id="slideLoading">Loading slides…</div>
                <canvas id="slideCanvas" style="display:none;"></canvas>
              </div>
              <div class="slideshow-controls">
                <button class="slide-btn" id="slidePrev" onclick="slideStep(-1)" disabled>‹ Prev</button>
                <span class="slide-counter" id="slideCounter">— / —</span>
                <button class="slide-btn" id="slideNext" onclick="slideStep(1)" disabled>Next ›</button>
              </div>
            </div>
            <div class="slide-notes-wrap">
              <div class="slide-notes-label">Notes</div>
              <div class="slide-notes-text" id="slideNotes"></div>
            </div>
          </div>`;
        initSlideshow(`assets/projects/${id}/${project.slides}`);
      }

      /* ── Image Deck (PNG slides + MP4 overlays) ───────────────── */
      // initDeck() is called from injectLayout() so #deck-anchor is guaranteed
      // to be in the DOM (it lives inside the fetched body HTML).
      function initDeck() {
        if (!project.deck || !project.deck.length) return;
        // Prefer #deck-anchor inside body HTML for inline placement;
        // fall back to #proj-slides if no anchor is present.
        const deckEl = document.getElementById('deck-anchor') ||
                       document.getElementById('proj-slides');
        const hasNotes = project.deck.some(s => s.note);
        deckEl.innerHTML = `
          <div class="deck-section">
            <div class="deck-label">${project.deckLabel || 'Slides'}</div>
            <div class="deck-wrap">
              <div class="deck-stage" id="deckStage">
                <img class="deck-slide-img" id="deckImg" src="" alt="Slide 1">
              </div>
              <div class="deck-controls">
                <button class="deck-btn" id="deckPrev" disabled>‹ Prev</button>
                <span class="deck-counter" id="deckCounter">1 / ${project.deck.length}</span>
                <button class="deck-btn" id="deckNext" ${project.deck.length <= 1 ? 'disabled' : ''}>Next ›</button>
              </div>
            </div>
            ${hasNotes ? `
            <div class="deck-notes-wrap">
              <div class="deck-notes-label">Notes</div>
              <div id="deckNotes"></div>
            </div>` : ''}
          </div>`;

        let deckPage = 0;
        const slides  = project.deck;
        const base    = `assets/projects/${id}/`;
        const imgEl   = document.getElementById('deckImg');
        const stage   = document.getElementById('deckStage');
        const counter = document.getElementById('deckCounter');
        const btnPrev = document.getElementById('deckPrev');
        const btnNext = document.getElementById('deckNext');
        const notesEl = document.getElementById('deckNotes');

        function deckShow(n) {
          const slide = slides[n];

          // Remove ALL video overlays from the previous slide
          stage.querySelectorAll('video.deck-video').forEach(v => { v.pause(); v.remove(); });

          // Swap slide image
          imgEl.src = base + slide.image;
          imgEl.alt = `Slide ${n + 1}`;

          // Overlay videos if this slide has any.
          // Accepts either slide.videos (array) or slide.video (single object, back-compat).
          const videoList = slide.videos
            ? slide.videos
            : (slide.video ? [slide.video] : []);

          if (videoList.length) {
            const mountVideos = () => {
              const iw = imgEl.naturalWidth  || imgEl.offsetWidth;
              const ih = imgEl.naturalHeight || imgEl.offsetHeight;
              const sw = stage.offsetWidth;
              const sh = sw * (ih / iw);

              videoList.forEach(v => {
                const vid = document.createElement('video');
                vid.className   = 'deck-video';
                vid.muted       = v.muted    !== false; // default muted
                vid.loop        = v.loop     !== false; // default loop
                vid.controls    = v.controls !== false; // default show controls
                vid.playsInline = true;

                vid.style.left   = (v.left   / 100 * sw) + 'px';
                vid.style.top    = (v.top    / 100 * sh) + 'px';
                vid.style.width  = (v.width  / 100 * sw) + 'px';
                vid.style.height = (v.height / 100 * sh) + 'px';

                const source = document.createElement('source');
                source.src  = base + v.src;
                source.type = v.src.endsWith('.mov') ? 'video/quicktime' : 'video/mp4';
                vid.appendChild(source);
                stage.appendChild(vid);
                vid.play().catch(() => {});
              });
            };

            if (imgEl.complete && imgEl.naturalWidth) {
              mountVideos();
            } else {
              imgEl.addEventListener('load', mountVideos, { once: true });
            }
          }

          // Update counter and buttons
          counter.textContent  = `${n + 1} / ${slides.length}`;
          btnPrev.disabled     = n <= 0;
          btnNext.disabled     = n >= slides.length - 1;
          deckPage             = n;

          // Notes
          if (notesEl) {
            const note = slide.note || '';
            if (note.trim()) {
              notesEl.className   = 'deck-notes-text';
              notesEl.textContent = note;
            } else {
              notesEl.className   = 'deck-notes-empty';
              notesEl.textContent = 'No notes for this slide.';
            }
          }
        }

        btnPrev.addEventListener('click', () => { if (deckPage > 0) deckShow(deckPage - 1); });
        btnNext.addEventListener('click', () => { if (deckPage < slides.length - 1) deckShow(deckPage + 1); });

        // Re-position all video overlays on window resize
        window.addEventListener('resize', () => {
          const currentVideos = slide.videos
            ? slide.videos
            : (slides[deckPage].video ? [slides[deckPage].video] : []);
          if (!currentVideos.length) return;
          const vids = [...stage.querySelectorAll('video.deck-video')];
          const iw = imgEl.naturalWidth || imgEl.offsetWidth;
          const ih = imgEl.naturalHeight || imgEl.offsetHeight;
          const sw = stage.offsetWidth;
          const sh = sw * (ih / iw);
          vids.forEach((vid, i) => {
            const v = currentVideos[i];
            if (!v) return;
            vid.style.left   = (v.left   / 100 * sw) + 'px';
            vid.style.top    = (v.top    / 100 * sh) + 'px';
            vid.style.width  = (v.width  / 100 * sw) + 'px';
            vid.style.height = (v.height / 100 * sh) + 'px';
          });
        });

        deckShow(0);
      }   // end initDeck

      /* ── Prev / Next nav ─────────────────────────────────────── */
      sortProjects(PROJECTS);
      const idx  = PROJECTS.findIndex(p => p.id === id);
      const prev = PROJECTS[idx + 1];
      const next = PROJECTS[idx - 1];
      document.getElementById('proj-nav').innerHTML = `
        <div class="proj-nav">
          <div>${prev ? `<a href="project.html?id=${prev.id}">← ${prev.name}</a>` : ''}</div>
          <div>${next ? `<a href="project.html?id=${next.id}">${next.name} →</a>` : ''}</div>
        </div>`;
    }

    /* ─── Lightbox ─────────────────────────────────────────────── */
    function lb(imgEl) {
      // Accepts either a DOM <img> element or a plain {src, alt} object
      const src = imgEl.src || imgEl.getAttribute?.('src') || '';
      const alt = imgEl.alt || '';
      document.getElementById('lbImg').src = src;
      document.getElementById('lbCaption').textContent = alt;
      document.getElementById('lightbox').classList.add('open');
    }
    function lbClose() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') lbClose();
    });

    /* ─── PDF Slideshow ─────────────────────────────────────────── */
    let pdfDoc = null, currentPage = 1;

    async function initSlideshow(url) {
      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        document.getElementById('slideLoading').style.display = 'none';
        document.getElementById('slideCanvas').style.display  = 'block';
        updateSlideUI();
        await renderSlide(1);
      } catch (err) {
        document.getElementById('slideLoading').textContent =
          `Could not load slides. Make sure the PDF is at assets/projects/${id}/${project.slides}`;
      }
    }

    async function renderSlide(n) {
      const page       = await pdfDoc.getPage(n);
      const canvas     = document.getElementById('slideCanvas');
      const containerW = canvas.parentElement.clientWidth;
      const vp0    = page.getViewport({ scale: 1 });
      const scale  = (containerW / vp0.width) * (window.devicePixelRatio || 1);
      const vp     = page.getViewport({ scale });
      canvas.width  = vp.width;
      canvas.height = vp.height;
      canvas.style.width  = containerW + 'px';
      canvas.style.height = Math.round(containerW * (vp0.height / vp0.width)) + 'px';
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      document.getElementById('slideCounter').textContent = `${n} / ${pdfDoc.numPages}`;
      const notes   = (project.notes || [])[n - 1] || '';
      const notesEl = document.getElementById('slideNotes');
      if (notes.trim()) {
        notesEl.className = 'slide-notes-text';
        notesEl.textContent = notes;
      } else {
        notesEl.className = 'slide-notes-empty';
        notesEl.textContent = 'No notes for this slide.';
      }
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { if (pdfDoc) renderSlide(currentPage); }, 150);
    });

    async function slideStep(dir) {
      const next = currentPage + dir;
      if (next < 1 || next > pdfDoc.numPages) return;
      currentPage = next;
      updateSlideUI();
      await renderSlide(currentPage);
    }

    function updateSlideUI() {
      document.getElementById('slidePrev').disabled = currentPage <= 1;
      document.getElementById('slideNext').disabled = currentPage >= (pdfDoc ? pdfDoc.numPages : 1);
    }
  </script>

  <script src="crane-count.js"></script>
  <script>document.getElementById("navCraneCount").textContent = CRANE_COUNT;</script>
</body>
